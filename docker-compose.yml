services:
  postgres:
    image: postgres:16-alpine
    container_name: px-onboarding-postgres
    environment:
      POSTGRES_DB: px_onboarding_wizard
      POSTGRES_USER: px
      POSTGRES_PASSWORD: px_password
    ports:
      - "5432:5432"
    volumes:
      - px_onboarding_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U px -d px_onboarding_wizard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  px_onboarding_postgres_data:
