services:
  postgres:
    image: postgres:16-alpine
    container_name: px-onboarding-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-px_onboarding_wizard}
      POSTGRES_USER: ${POSTGRES_USER:-px}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-px_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - px_onboarding_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-px} -d ${POSTGRES_DB:-px_onboarding_wizard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: ${BACKEND_ENVIRONMENT:-development}
      SECRET_KEY: ${BACKEND_SECRET_KEY:-dev-only-change-me}
      DATA_ENCRYPTION_KEY: ${BACKEND_DATA_ENCRYPTION_KEY:-}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://px:px_password@postgres:5432/px_onboarding_wizard}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SESSION_COOKIE_SECURE: ${BACKEND_SESSION_COOKIE_SECURE:-false}
      SESSION_MAX_AGE_SECONDS: ${BACKEND_SESSION_MAX_AGE_SECONDS:-1209600}
      USE_MOCK_INTEGRATIONS: ${BACKEND_USE_MOCK_INTEGRATIONS:-true}
      JIRA_BASE_URL: ${BACKEND_JIRA_BASE_URL:-}
      JIRA_EMAIL: ${BACKEND_JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${BACKEND_JIRA_API_TOKEN:-}
      INTEGRATION_SYNC_INTERVAL_SECONDS: ${BACKEND_INTEGRATION_SYNC_INTERVAL_SECONDS:-300}
      INTEGRATION_AUTO_SYNC_ENABLED: ${BACKEND_INTEGRATION_AUTO_SYNC_ENABLED:-true}
      MONDAY_API_TOKEN: ${BACKEND_MONDAY_API_TOKEN:-}
      MAX_UPLOAD_BYTES: ${BACKEND_MAX_UPLOAD_BYTES:-5242880}
      UPLOAD_DIR: /app/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/app/uploads

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${FRONTEND_VITE_API_URL:-}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  px_onboarding_postgres_data:
  backend_uploads:
